<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Connexion — Memryls</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Pacifico&family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Josefin+Sans:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles/auth.css" />
  </head>

  <body>
    <div
      class="bg-circle"
      style="width: 400px; height: 400px; top: 10%; left: -10%"
    ></div>
    <div
      class="bg-circle"
      style="width: 600px; height: 600px; bottom: 10%; right: -15%"
    ></div>
    <div
      class="bg-circle"
      style="width: 300px; height: 300px; top: 50%; left: 70%"
    ></div>
    <div class="bg-stars" id="bg-stars"></div>

    <svg
      class="bg-rocket"
      style="
        width: 100px;
        top: 15%;
        right: 10%;
        animation: float-drift 6s ease-in-out infinite;
      "
      viewBox="0 0 100 150"
      xmlns="http://www.w3.org/2000/svg"
    >
      <ellipse cx="50" cy="60" rx="15" ry="40" fill="#c0392b" />
      <ellipse cx="50" cy="20" rx="8" ry="15" fill="#1e2d40" />
      <rect x="35" y="85" width="6" height="20" rx="2" fill="#c0392b" />
      <rect x="59" y="85" width="6" height="20" rx="2" fill="#c0392b" />
      <ellipse cx="50" cy="60" rx="9" ry="9" fill="#f0e8d0" opacity="0.7" />
      <rect
        x="47"
        y="100"
        width="6"
        height="40"
        rx="3"
        fill="rgba(240,232,208,0.6)"
      />
    </svg>

    <svg
      class="bg-rocket"
      style="
        width: 80px;
        bottom: 20%;
        left: 8%;
        animation: float-drift 8s ease-in-out infinite 2s;
      "
      viewBox="0 0 100 150"
      xmlns="http://www.w3.org/2000/svg"
    >
      <ellipse cx="50" cy="60" rx="15" ry="40" fill="#d4a843" />
      <ellipse cx="50" cy="20" rx="8" ry="15" fill="#c0392b" />
      <rect x="35" y="85" width="6" height="20" rx="2" fill="#d4a843" />
      <rect x="59" y="85" width="6" height="20" rx="2" fill="#d4a843" />
      <ellipse cx="50" cy="60" rx="9" ry="9" fill="#f0e8d0" opacity="0.7" />
      <rect
        x="47"
        y="100"
        width="6"
        height="40"
        rx="3"
        fill="rgba(240,232,208,0.5)"
      />
    </svg>

    <div class="auth-container">
      <div class="auth-card">
        <div class="auth-header">
          <div class="corner tl"></div>
          <div class="corner tr"></div>
          <div class="corner bl"></div>
          <div class="corner br"></div>
          <h1 class="auth-logo">Memryls</h1>
          <p class="auth-tagline">Portail d'accès — Mission Control</p>
        </div>

        <div class="auth-tabs">
          <button class="auth-tab active" data-tab="login">Connexion</button>
          <button class="auth-tab" data-tab="signup">Inscription</button>
        </div>

        <div class="auth-body">
          <form class="auth-form active" id="login-form">
            <div class="form-group">
              <label class="form-label" for="login-email">Adresse Email</label>
              <input
                type="email"
                class="form-input"
                id="login-email"
                placeholder="octave@memryls.space"
                required
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="login-password"
                >Mot de passe</label
              >
              <input
                type="password"
                class="form-input"
                id="login-password"
                placeholder="••••••••"
                required
              />
            </div>

            <div class="form-checkbox-group">
              <input type="checkbox" class="form-checkbox" id="remember-me" />
              <label class="form-checkbox-label" for="remember-me">
                Rester connecté
              </label>
            </div>

            <button type="submit" class="btn btn-primary">
              Lancer la mission →
            </button>

            <p class="form-link">
              <a href="#forgot">Mot de passe oublié ?</a>
            </p>

            <div class="divider">
              <div class="divider-line"></div>
              <span class="divider-text">Ou continuer avec</span>
              <div class="divider-line"></div>
            </div>

            <div class="social-buttons">
              <button type="button" class="btn-social" id="google-login">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                  />
                  <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                  />
                  <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                  />
                  <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                  />
                </svg>
                Google
              </button>
              <button type="button" class="btn-social" id="discord-login">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path
                    d="M20.317 4.492c-1.53-.69-3.17-1.2-4.885-1.49a.075.075 0 0 0-.079.036c-.21.369-.444.85-.608 1.23a18.566 18.566 0 0 0-5.487 0 12.36 12.36 0 0 0-.617-1.23A.077.077 0 0 0 8.562 3c-1.714.29-3.354.8-4.885 1.491a.07.07 0 0 0-.032.027C.533 9.093-.32 13.555.099 17.961a.08.08 0 0 0 .031.055 20.03 20.03 0 0 0 5.993 2.98.078.078 0 0 0 .084-.026c.462-.62.874-1.275 1.226-1.963.021-.04.001-.088-.041-.104a13.201 13.201 0 0 1-1.872-.878.075.075 0 0 1-.008-.125c.126-.093.252-.19.372-.287a.075.075 0 0 1 .078-.01c3.927 1.764 8.18 1.764 12.061 0a.075.075 0 0 1 .079.009c.12.098.245.195.372.288a.075.075 0 0 1-.006.125c-.598.344-1.22.635-1.873.877a.075.075 0 0 0-.041.105c.36.687.772 1.341 1.225 1.962a.077.077 0 0 0 .084.028 19.963 19.963 0 0 0 6.002-2.981.076.076 0 0 0 .032-.054c.5-5.094-.838-9.52-3.549-13.442a.06.06 0 0 0-.031-.028zM8.02 15.278c-1.182 0-2.157-1.069-2.157-2.38 0-1.312.956-2.38 2.157-2.38 1.21 0 2.176 1.077 2.157 2.38 0 1.312-.956 2.38-2.157 2.38zm7.975 0c-1.183 0-2.157-1.069-2.157-2.38 0-1.312.955-2.38 2.157-2.38 1.21 0 2.176 1.077 2.157 2.38 0 1.312-.946 2.38-2.157 2.38z"
                  />
                </svg>
                Discord
              </button>
            </div>
          </form>

          <form class="auth-form" id="signup-form">
            <div class="form-group">
              <label class="form-label" for="signup-username"
                >Nom d'utilisateur</label
              >
              <input
                type="text"
                class="form-input"
                id="signup-username"
                placeholder="Octave_Pilot"
                required
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="signup-email">Adresse Email</label>
              <input
                type="email"
                class="form-input"
                id="signup-email"
                placeholder="octave@memryls.space"
                required
              />
            </div>

            <div class="form-group">
              <label class="form-label" for="signup-password"
                >Mot de passe</label
              >
              <input
                type="password"
                class="form-input"
                id="signup-password"
                placeholder="••••••••"
                required
              />
              <div class="password-strength" id="password-strength">
                <div class="password-strength-bar"></div>
              </div>
            </div>

            <div class="form-group">
              <label class="form-label" for="signup-password-confirm"
                >Confirmer le mot de passe</label
              >
              <input
                type="password"
                class="form-input"
                id="signup-password-confirm"
                placeholder="••••••••"
                required
              />
            </div>

            <div class="form-checkbox-group">
              <input
                type="checkbox"
                class="form-checkbox"
                id="accept-terms"
                required
              />
              <label class="form-checkbox-label" for="accept-terms">
                J'accepte les
                <a href="#terms" style="color: var(--rust); font-weight: 700"
                  >conditions d'utilisation</a
                >
              </label>
            </div>

            <button type="submit" class="btn btn-primary">
              Rejoindre la mission →
            </button>

            <div class="divider">
              <div class="divider-line"></div>
              <span class="divider-text">Ou s'inscrire avec</span>
              <div class="divider-line"></div>
            </div>

            <div class="social-buttons">
              <button type="button" class="btn-social" id="google-signup">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path
                    d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                  />
                  <path
                    d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                  />
                  <path
                    d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
                  />
                  <path
                    d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                  />
                </svg>
                Google
              </button>
              <button type="button" class="btn-social" id="discord-signup">
                <svg viewBox="0 0 24 24" fill="currentColor">
                  <path
                    d="M20.317 4.492c-1.53-.69-3.17-1.2-4.885-1.49a.075.075 0 0 0-.079.036c-.21.369-.444.85-.608 1.23a18.566 18.566 0 0 0-5.487 0 12.36 12.36 0 0 0-.617-1.23A.077.077 0 0 0 8.562 3c-1.714.29-3.354.8-4.885 1.491a.07.07 0 0 0-.032.027C.533 9.093-.32 13.555.099 17.961a.08.08 0 0 0 .031.055 20.03 20.03 0 0 0 5.993 2.98.078.078 0 0 0 .084-.026c.462-.62.874-1.275 1.226-1.963.021-.04.001-.088-.041-.104a13.201 13.201 0 0 1-1.872-.878.075.075 0 0 1-.008-.125c.126-.093.252-.19.372-.287a.075.075 0 0 1 .078-.01c3.927 1.764 8.18 1.764 12.061 0a.075.075 0 0 1 .079.009c.12.098.245.195.372.288a.075.075 0 0 1-.006.125c-.598.344-1.22.635-1.873.877a.075.075 0 0 0-.041.105c.36.687.772 1.341 1.225 1.962a.077.077 0 0 0 .084.028 19.963 19.963 0 0 0 6.002-2.981.076.076 0 0 0 .032-.054c.5-5.094-.838-9.52-3.549-13.442a.06.06 0 0 0-.031-.028zM8.02 15.278c-1.182 0-2.157-1.069-2.157-2.38 0-1.312.956-2.38 2.157-2.38 1.21 0 2.176 1.077 2.157 2.38 0 1.312-.956 2.38-2.157 2.38zm7.975 0c-1.183 0-2.157-1.069-2.157-2.38 0-1.312.955-2.38 2.157-2.38 1.21 0 2.176 1.077 2.157 2.38 0 1.312-.946 2.38-2.157 2.38z"
                  />
                </svg>
                Discord
              </button>
            </div>
          </form>
        </div>

        <div class="auth-footer">
          <a href="/" class="auth-footer-link"> ← Retour à l'accueil </a>
        </div>
      </div>
    </div>
    <script src="./scripts/auth.js"></script>
  </body>
</html>
